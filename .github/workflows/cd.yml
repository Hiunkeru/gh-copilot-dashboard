name: CD

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish -c Release -o ./publish
        working-directory: src/backend/CopilotDashboard.Api

      - uses: actions/upload-artifact@v4
        with:
          name: backend
          path: src/backend/CopilotDashboard.Api/publish

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_AZURE_AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID }}
          NEXT_PUBLIC_AZURE_AD_API_CLIENT_ID: ${{ vars.AZURE_AD_API_CLIENT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: src/frontend/out

  infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=copilot-dashboard-${{ vars.ENVIRONMENT }}.tfstate"
        working-directory: infra

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var-file=environments/${{ vars.ENVIRONMENT }}.tfvars \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}"
        working-directory: infra

  deploy-backend:
    name: Deploy Backend
    needs: [build-backend, infra]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend
          path: ./publish

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: app-copilot-dashboard-${{ vars.ENVIRONMENT }}
          package: ./publish

  deploy-frontend:
    name: Deploy Frontend
    needs: [build-frontend, infra]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: ./frontend-out

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./frontend-out
          skip_app_build: true
