name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore
        working-directory: src/backend/CopilotDashboard.Api

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: src/backend/CopilotDashboard.Api

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.azurewebsites.net
          NEXT_PUBLIC_AZURE_AD_CLIENT_ID: placeholder
          NEXT_PUBLIC_AZURE_AD_TENANT_ID: placeholder
          NEXT_PUBLIC_AZURE_AD_API_CLIENT_ID: placeholder

  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra
